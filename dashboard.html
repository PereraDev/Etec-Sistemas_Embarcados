<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão Energética Inteligente</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #fff;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #e2e8f0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto 24px;
    }

    .card {
      background: #1e2130;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      border: 1px solid #2d3148;
    }

    .card-label {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .card-value {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
    }

    .card-unit {
      font-size: 14px;
      color: #64748b;
      margin-top: 4px;
    }

    .status-bar {
      max-width: 900px;
      margin: 0 auto 24px;
      background: #1e2130;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #2d3148;
    }

    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-normal   { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    .dot-alerta   { background: #eab308; box-shadow: 0 0 8px #eab308; }
    .dot-perigo   { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    .dot-offline  { background: #475569; }

    .status-text {
      font-size: 15px;
      font-weight: 500;
    }

    .devices {
      max-width: 900px;
      margin: 0 auto 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .device {
      background: #1e2130;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #2d3148;
    }

    .device-icon {
      font-size: 24px;
    }

    .device-name {
      font-size: 13px;
      color: #94a3b8;
    }

    .device-status {
      font-size: 14px;
      font-weight: 600;
    }

    .on  { color: #22c55e; }
    .off { color: #475569; }

    .log {
      max-width: 900px;
      margin: 0 auto;
      background: #1e2130;
      border-radius: 12px;
      padding: 16px 20px;
      border: 1px solid #2d3148;
    }

    .log-title {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .log-list {
      list-style: none;
      max-height: 160px;
      overflow-y: auto;
    }

    .log-list li {
      font-size: 12px;
      color: #64748b;
      padding: 4px 0;
      border-bottom: 1px solid #2d3148;
    }

    .log-list li:last-child { border-bottom: none; }

    .conn-badge {
      max-width: 900px;
      margin: 0 auto 16px;
      font-size: 12px;
      color: #64748b;
      text-align: right;
    }
  </style>
</head>
<body>

<h1>⚡ Gestão Energética Inteligente</h1>

<div class="conn-badge" id="connBadge">🔴 Desconectado</div>

<div class="status-bar">
  <div class="status-dot dot-offline" id="statusDot"></div>
  <span class="status-text" id="statusText">Aguardando dados...</span>
</div>

<div class="grid">
  <div class="card">
    <div class="card-label">⚡ Carga</div>
    <div class="card-value" id="carga">--</div>
    <div class="card-unit">%</div>
  </div>
  <div class="card">
    <div class="card-label">🌡️ Temperatura</div>
    <div class="card-value" id="temp">--</div>
    <div class="card-unit">°C</div>
  </div>
</div>

<div class="devices">
  <div class="device">
    <span class="device-icon">🌀</span>
    <div>
      <div class="device-name">Fan</div>
      <div class="device-status off" id="fanStatus">OFF</div>
    </div>
  </div>
  <div class="device">
    <span class="device-icon">⚡</span>
    <div>
      <div class="device-name">Relé</div>
      <div class="device-status off" id="releStatus">OFF</div>
    </div>
  </div>
  <div class="device">
    <span class="device-icon">🔊</span>
    <div>
      <div class="device-name">Buzzer</div>
      <div class="device-status off" id="buzzerStatus">OFF</div>
    </div>
  </div>
</div>

<div class="log">
  <div class="log-title">📋 Log de eventos</div>
  <ul class="log-list" id="logList">
    <li>Aguardando conexão...</li>
  </ul>
</div>

<script>
  // ============================================
  // CONFIGURAÇÃO — troca pela URL do seu Render
  // ============================================
  const BROKER_URL = 'ws://energia-xrw3.onrender.com:9001';

  const client = mqtt.connect(BROKER_URL);

  function addLog(msg) {
    const li = document.createElement('li');
    const agora = new Date().toLocaleTimeString('pt-BR');
    li.textContent = [${agora}] ${msg};
    const list = document.getElementById('logList');
    list.insertBefore(li, list.firstChild);
    if (list.children.length > 50) list.removeChild(list.lastChild);
  }

  client.on('connect', () => {
    document.getElementById('connBadge').textContent = '🟢 Conectado ao broker';

    client.subscribe('energia/carga');
    client.subscribe('energia/temperatura');
    client.subscribe('energia/status');
    client.subscribe('energia/fan');
    client.subscribe('energia/rele');
    client.subscribe('energia/buzzer');

    addLog('Conectado ao broker MQTT');
  });

  client.on('error', (err) => {
    document.getElementById('connBadge').textContent = '🔴 Erro de conexão';
    addLog('Erro: ' + err.message);
  });

  client.on('message', (topic, message) => {
    const valor = message.toString();

    if (topic === 'energia/carga') {
      document.getElementById('carga').textContent = valor;
    }

    if (topic === 'energia/temperatura') {
      document.getElementById('temp').textContent = valor;
    }

    if (topic === 'energia/status') {
      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');

      dot.className = 'status-dot';

      if (valor === 'NORMAL') {
        dot.classList.add('dot-normal');
        text.textContent = '✅ Sistema Normal';
      } else if (valor === 'ALERTA') {
        dot.classList.add('dot-alerta');
        text.textContent = '🟡 Sistema em Alerta';
      } else if (valor === 'PERIGO') {
        dot.classList.add('dot-perigo');
        text.textContent = '🔴 Sistema em Perigo!';
      } else if (valor === 'PROTECAO') {
        dot.classList.add('dot-perigo');
        text.textContent = '🛡️ PROTEÇÃO ATIVADA — Sistema OFF';
      }

      addLog('Status: ' + valor);
    }

    if (topic === 'energia/fan') {
      const el = document.getElementById('fanStatus');
      el.textContent = valor;
      el.className = 'device-status ' + (valor === 'ON' ? 'on' : 'off');
    }

    if (topic === 'energia/rele') {
      const el = document.getElementById('releStatus');
      el.textContent = valor;
      el.className = 'device-status ' + (valor === 'ON' ? 'on' : 'off');
    }

    if (topic === 'energia/buzzer') {
      const el = document.getElementById('buzzerStatus');
      el.textContent = valor;
      el.className = 'device-status ' + (valor === 'ON' ? 'on' : 'off');
    }
  });
</script>

</body>
</html>
